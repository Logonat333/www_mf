<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MailFlow CRM</title>
    <style>
      :root {
        color-scheme: light;
        --bg-a: #f4f7ff;
        --bg-b: #edf7f4;
        --panel: rgba(255, 255, 255, 0.9);
        --text: #1f2430;
        --muted: #7b8191;
        --accent: #2f57d8;
        --accent-soft: rgba(47, 87, 216, 0.12);
        --border: rgba(31, 36, 48, 0.08);
        --shadow: 0 30px 80px rgba(47, 87, 216, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(47, 87, 216, 0.12), transparent 28%),
          radial-gradient(circle at bottom right, rgba(60, 179, 113, 0.14), transparent 24%),
          linear-gradient(135deg, var(--bg-a), var(--bg-b));
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }

      .card {
        width: min(760px, 100%);
        padding: 48px;
        border-radius: 32px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        color: var(--accent);
        background: var(--accent-soft);
      }

      h1 {
        margin: 24px 0 16px;
        font-size: clamp(40px, 7vw, 72px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        max-width: 540px;
        font-size: 18px;
        line-height: 1.6;
        color: var(--muted);
      }

      .footer {
        margin-top: 32px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .pill {
        padding: 12px 16px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        color: var(--text);
      }

      @media (max-width: 640px) {
        .card {
          padding: 28px;
          border-radius: 24px;
        }

        p {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">MailFlow CRM</div>
      <h1>Скоро здесь будет сайт проекта</h1>
      <p>
        Мы готовим обновлённую платформу MailFlow CRM. В ближайшее время на этом домене появится
        полноценный сайт и вход в экосистему проекта.
      </p>
      <div class="footer">
        <div class="pill">Светлая эстетика платформы</div>
        <div class="pill">Новый кабинет уже разворачивается</div>
        <div class="pill">MailFlow CRM</div>
      </div>
    </main>
  </body>
</html>
